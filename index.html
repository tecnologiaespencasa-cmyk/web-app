<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Especialistas En Casa | Sitio en Construccion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #f5f7fa, #e4e7eb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    color: #333;
}

.container {
    background: #ffffff;
    padding: 60px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    max-width: 700px;
    width: 90%;
    animation: fadeIn 1.2s ease-in-out;
}

.logo {
    max-width: 320px;
    margin-bottom: 35px;
}

h1 {
    color: #c62828;
    font-weight: 600;
    margin-bottom: 25px;
    font-size: 32px;
}

p {
    font-size: 17px;
    margin-bottom: 20px;
    line-height: 1.6;
}

.footer-note {
    margin-top: 35px;
    font-size: 13px;
    color: #999;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" alt="Especialistas En Casa" class="logo">

    <h1>Estamos renovando nuestro sitio web</h1>

    <p>
        En Especialistas En Casa estamos trabajando en una nueva experiencia
        digital mas moderna, rapida y segura para nuestros usuarios.
    </p>

    <p>
        Pronto estaremos nuevamente en linea con mejoras importantes.
    </p>

    <div class="footer-note">
        Especialistas En Casa - Salud Domiciliaria
    </div>

</div>

</body>
</html>
